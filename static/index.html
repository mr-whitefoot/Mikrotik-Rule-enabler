<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MikroTik · Routing Rules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-badge">⇄</div>
    Mikrotik<em>Route</em>
  </div>
  <div class="hdr-right">
    <div class="pill" id="statusPill">
      <span class="pill-dot"></span>
      <span id="statusTxt">offline</span>
    </div>
    <button class="icon-btn" id="refreshBtn" title="Обновить" onclick="loadRules()">↻</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('rules',this)">Правила</button>
    <button class="tab" onclick="switchTab('vis',this)">Видимость</button>
    <button class="tab" onclick="switchTab('log',this)">Лог</button>
  </div>

  <!-- RULES PANEL -->
  <div class="panel active" id="panel-rules">
    <div class="stats">
      <div class="stat-card"><div class="stat-n" id="sTotal">–</div><div class="stat-l">Всего</div></div>
      <div class="stat-card"><div class="stat-n g" id="sOn">–</div><div class="stat-l">Активно</div></div>
      <div class="stat-card"><div class="stat-n r" id="sOff">–</div><div class="stat-l">Выключено</div></div>
      <div class="stat-card"><div class="stat-n m" id="sHid">–</div><div class="stat-l">Скрыто</div></div>
    </div>

    <div class="toolbar">
      <div class="search">
        <span class="search-ic">⌕</span>
        <input id="searchQ" placeholder="Поиск по комментарию…" oninput="render()">
      </div>
      <div class="filter-btns">
        <button class="fbtn active" onclick="setFilter('all',this)">Все</button>
        <button class="fbtn g"      onclick="setFilter('on',this)">Активные</button>
        <button class="fbtn r"      onclick="setFilter('off',this)">Выключенные</button>
      </div>
    </div>

    <div class="rules-list" id="rulesList">
      <div class="skel"></div>
      <div class="skel" style="opacity:.7"></div>
      <div class="skel" style="opacity:.4"></div>
    </div>
  </div>

  <!-- VISIBILITY PANEL -->
  <div class="panel" id="panel-vis">
    <div class="toolbar" style="margin-bottom:.9rem">
      <p style="font-size:.73rem;color:var(--muted);flex:1">
        Снимите галочку — правило исчезнет с главной страницы. Сохраняется в браузере.
      </p>
      <button class="btn" onclick="visAll(true)">Показать все</button>
      <button class="btn" onclick="visAll(false)">Скрыть все</button>
    </div>
    <div class="vis-list" id="visList">
      <div style="color:var(--muted);font-size:.75rem;padding:.8rem">Сначала загрузите правила</div>
    </div>
  </div>

  <!-- LOG PANEL -->
  <div class="panel" id="panel-log">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <span style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Журнал действий</span>
      <button class="btn" onclick="clearLog()">Очистить</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>

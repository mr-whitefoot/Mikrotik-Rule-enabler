<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MikroTik · Routing Rules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b0f;
    --surface: #0e1117;
    --card:    #131720;
    --border:  #1c2133;
    --accent:  #4f9eff;
    --green:   #3ecf8e;
    --red:     #ff5263;
    --warn:    #f5a623;
    --text:    #dde4f0;
    --muted:   #3d4d66;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(79,158,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 90% 100%, rgba(62,207,142,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,11,15,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: 56px;
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--green));
    border-radius: 6px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .logo em { font-style: normal; color: var(--accent); }

  .hdr-right { display: flex; align-items: center; gap: 10px; }

  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface);
  }
  .pill.online { color: var(--green); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.06); }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.online .pill-dot { animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .icon-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 7px;
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.spin { animation: spinning 0.8s linear infinite; }
  @keyframes spinning { to { transform: rotate(360deg); } }

  .wrap {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 1.8rem 1.4rem 4rem;
  }

  .tabs {
    display: flex; gap: 1px;
    background: var(--border);
    border-radius: 9px;
    overflow: hidden;
    margin-bottom: 1.6rem;
    width: fit-content;
    border: 1px solid var(--border);
  }
  .tab {
    padding: 7px 18px;
    font-family: var(--mono);
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--muted);
    background: var(--surface);
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tab.active { background: var(--card); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; }
  .panel.active { display: block; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
  }
  .stat-n {
    font-family: var(--sans);
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .stat-n.g { color: var(--green); }
  .stat-n.r { color: var(--red); }
  .stat-n.m { color: var(--muted); }
  .stat-l {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .search { flex: 1; min-width: 180px; max-width: 300px; position: relative; }
  .search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search input::placeholder { color: var(--muted); }
  .search-ic {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 13px; pointer-events: none;
  }

  .filter-btns { display: flex; gap: 4px; }
  .fbtn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .fbtn:hover { border-color: var(--accent); color: var(--accent); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .fbtn.g.active { background: var(--green); border-color: var(--green); }
  .fbtn.r.active { background: var(--red); border-color: var(--red); }

  .rules-list { display: flex; flex-direction: column; gap: 5px; }

  .rule-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 13px 15px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.15s, opacity 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .rule-card::after {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
    transition: background 0.2s;
  }
  .rule-card.on::after  { background: var(--green); }
  .rule-card.off::after { background: var(--border); }
  .rule-card:hover { border-color: rgba(79,158,255,0.25); }

  .rule-idx { font-size: 0.62rem; color: var(--muted); min-width: 20px; text-align: right; }

  .rule-body { flex: 1; min-width: 0; }
  .rule-comment {
    font-size: 0.84rem;
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .rule-tags {
    display: flex; gap: 5px;
    margin-top: 5px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag {
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .tag.src { color: #7ba7ff; border-color: rgba(123,167,255,0.25); }
  .tag.dst { color: #a78bfa; border-color: rgba(167,139,250,0.25); }
  .tag.tbl { color: #6ee7b7; border-color: rgba(110,231,183,0.25); }
  .tag.id  { color: var(--muted); opacity: 0.5; font-size: 0.56rem; }

  .toggle { position: relative; width: 42px; height: 22px; flex-shrink: 0; cursor: pointer; }
  .toggle input { opacity:0; width:0; height:0; position:absolute; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 22px;
    transition: background 0.25s, border 0.25s;
    pointer-events: none;
  }
  .toggle-thumb {
    position: absolute;
    left: 3px; top: 3px;
    width: 16px; height: 16px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.25s, background 0.25s, box-shadow 0.25s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-track {
    background: rgba(62,207,142,0.18);
    border: 1px solid rgba(62,207,142,0.4);
  }
  .toggle input:checked ~ .toggle-thumb {
    transform: translateX(20px);
    background: var(--green);
    box-shadow: 0 0 7px var(--green);
  }
  .toggle.busy { opacity: 0.4; pointer-events: none; }

  .empty { text-align: center; padding: 3.5rem 2rem; color: var(--muted); }
  .empty-ico { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.25; }
  .empty h3 { font-family: var(--sans); font-size: 0.95rem; color: var(--text); opacity: 0.4; margin-bottom: 6px; }
  .empty p  { font-size: 0.72rem; }

  .skel {
    height: 60px; border-radius: 9px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    margin-bottom: 5px;
  }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .vis-list { display:flex; flex-direction:column; gap:5px; }
  .vis-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 13px;
  }
  .vis-item label {
    flex:1; display:flex; align-items:center; gap:9px;
    font-size: 0.78rem; cursor: pointer;
  }
  .vis-item input[type=checkbox] { width:15px; height:15px; accent-color: var(--accent); cursor:pointer; }
  .vis-meta { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }

  .sec { margin-bottom: 1.8rem; }
  .sec-title {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 600;
    padding-bottom: 8px; margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cfg-field { display:flex; flex-direction:column; gap:5px; }
  .cfg-field label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
  .cfg-field input, .cfg-field select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 10px;
    color: var(--text); font-family: var(--mono); font-size:0.78rem;
    outline: none; transition: border-color 0.15s;
  }
  .cfg-field input:focus, .cfg-field select:focus { border-color: var(--accent); }
  .cfg-field input::placeholder { color: var(--muted); opacity:0.5; }
  .cfg-field select option { background: var(--card); }

  .cfg-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:.5rem; }

  .btn {
    padding: 7px 14px; border-radius: 7px;
    font-family: var(--mono); font-size: 0.72rem;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all 0.15s; letter-spacing: 0.03em;
    display: flex; align-items: center; gap: 5px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.prim { background: var(--accent); border-color: var(--accent); color: #000; font-weight:700; }
  .btn.prim:hover { filter: brightness(1.1); }

  .log-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 12px;
    height: 280px; overflow-y: auto; font-size: 0.7rem; line-height: 1.8;
  }
  .log-row { display:flex; gap:10px; border-bottom:1px solid rgba(255,255,255,0.03); padding:1px 0; }
  .log-t { color:var(--muted); flex-shrink:0; }
  .log-m.ok   { color: var(--green); }
  .log-m.err  { color: var(--red); }
  .log-m.info { color: var(--accent); }
  .log-m.warn { color: var(--warn); }

  .overlay {
    position: fixed; inset:0; z-index:500;
    background: rgba(0,0,0,0.75); backdrop-filter:blur(10px);
    display:flex; align-items:center; justify-content:center;
  }
  .overlay.hidden { display:none; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.8rem;
    width:100%; max-width:380px; margin:1rem;
  }
  .modal h2 { font-family:var(--sans); font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; }
  .modal p  { font-size:0.72rem; color:var(--muted); margin-bottom:1.3rem; }
  .modal-flds { display:flex; flex-direction:column; gap:9px; margin-bottom:1.3rem; }
  .modal-acts { display:flex; gap:8px; justify-content:flex-end; }

  #toasts {
    position:fixed; bottom:1.2rem; right:1.2rem; z-index:999;
    display:flex; flex-direction:column; gap:6px; pointer-events:none;
  }
  .toast {
    background:var(--card); border:1px solid var(--border); border-radius:9px;
    padding:10px 14px; font-size:0.75rem;
    display:flex; align-items:center; gap:9px;
    animation: tIn 0.25s ease; pointer-events:all;
    min-width:220px; max-width:340px;
  }
  .toast.ok  { border-left:3px solid var(--green); }
  .toast.err { border-left:3px solid var(--red); }
  .toast.inf { border-left:3px solid var(--accent); }
  .toast-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; margin-left:auto; }
  @keyframes tIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }

  @media(max-width:560px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .cfg-grid { grid-template-columns:1fr; }
    .filter-btns { display:none; }
  }
</style>
</head>
<body>



<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-badge">⇄</div>
    Mikrotik<em>Route</em>
  </div>
  <div class="hdr-right">
    <div class="pill" id="statusPill">
      <span class="pill-dot"></span>
      <span id="statusTxt">offline</span>
    </div>
    <button class="icon-btn" id="refreshBtn" title="Обновить" onclick="loadRules()">↻</button>
  </div>
</header>

<div class="wrap">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('rules',this)">Правила</button>
    <button class="tab" onclick="switchTab('vis',this)">Видимость</button>
    <button class="tab" onclick="switchTab('log',this)">Лог</button>
  </div>

  <!-- RULES -->
  <div class="panel active" id="panel-rules">
    <div class="stats">
      <div class="stat-card"><div class="stat-n" id="sTotal">–</div><div class="stat-l">Всего</div></div>
      <div class="stat-card"><div class="stat-n g" id="sOn">–</div><div class="stat-l">Активно</div></div>
      <div class="stat-card"><div class="stat-n r" id="sOff">–</div><div class="stat-l">Выключено</div></div>
      <div class="stat-card"><div class="stat-n m" id="sHid">–</div><div class="stat-l">Скрыто</div></div>
    </div>

    <div class="toolbar">
      <div class="search">
        <span class="search-ic">⌕</span>
        <input id="searchQ" placeholder="Поиск по комментарию…" oninput="render()">
      </div>
      <div class="filter-btns">
        <button class="fbtn active" onclick="setFilter('all',this)">Все</button>
        <button class="fbtn g"      onclick="setFilter('on',this)">Активные</button>
        <button class="fbtn r"      onclick="setFilter('off',this)">Выключенные</button>
      </div>
    </div>

    <div class="rules-list" id="rulesList">
      <div class="skel"></div>
      <div class="skel" style="opacity:.7"></div>
      <div class="skel" style="opacity:.4"></div>
    </div>
  </div>

  <!-- VISIBILITY -->
  <div class="panel" id="panel-vis">
    <div class="toolbar" style="margin-bottom:.9rem">
      <p style="font-size:.73rem;color:var(--muted);flex:1">
        Снимите галочку — правило исчезнет с главной страницы. Сохраняется в браузере.
      </p>
      <button class="btn" onclick="visAll(true)">Показать все</button>
      <button class="btn" onclick="visAll(false)">Скрыть все</button>
    </div>
    <div class="vis-list" id="visList">
      <div style="color:var(--muted);font-size:.75rem;padding:.8rem">Сначала загрузите правила</div>
    </div>
  </div>

  <!-- LOG -->
  <div class="panel" id="panel-log">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <span style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Журнал действий</span>
      <button class="btn" onclick="clearLog()">Очистить</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>

<div id="toasts"></div>

<script>
// ── STATE ──
let rules  = [];
let visMap = {};
let activeF = 'all';
let logs   = [];

// ── BOOT ──
window.addEventListener('DOMContentLoaded', () => {
  loadVis();
  loadRules();
});


// ── VISIBILITY ──
function loadVis() {
  try { visMap = JSON.parse(localStorage.getItem('mtr_vis') || '{}'); } catch(e){ visMap={}; }
}
function saveVis() { localStorage.setItem('mtr_vis', JSON.stringify(visMap)); }
function isVis(c)  { return visMap[c] !== false; }

function visAll(v) {
  rules.forEach(r => { if(r.comment) visMap[r.comment] = v; });
  saveVis(); renderVisList(); render();
  toast(v ? 'Все правила показаны' : 'Все правила скрыты', 'inf');
}

function setVis(c, v) { visMap[c] = v; saveVis(); render(); updateStats(); }

// ── API ──
async function callAPI(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── LOAD RULES ──
async function loadRules() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  showSkels();
  try {
    const data = await callAPI('/api/rules', { });
    // Фильтруем: только правила с непустым комментарием
    rules = (data.rules || []).filter(r => r.comment && r.comment.trim() !== '');
    setOnline(true);
    addLog('Загружено ' + rules.length + ' routing rules (с комментариями)', 'ok');
    render(); renderVisList(); updateStats();
  } catch(e) {
    setOnline(false);
    addLog('Ошибка: ' + e.message, 'err');
    showErr(e.message);
  } finally {
    btn.classList.remove('spin');
  }
}

// ── TOGGLE ──
async function toggleRule(id, enable, cb) {
  const wrap = cb.closest('.toggle');
  const card = cb.closest('.rule-card');
  wrap.classList.add('busy');
  card.style.opacity = '0.55';
  try {
    await callAPI('/api/rule/toggle', { id, enable });
    const r = rules.find(x => (x['.id'] || x.id) === id);
    if (r) r.disabled = enable ? 'false' : 'true';
    card.classList.toggle('on',  enable);
    card.classList.toggle('off', !enable);
    updateStats();
    const name = r ? r.comment : id;
    addLog('"' + name + '" → ' + (enable ? 'включено' : 'выключено'), 'ok');
    toast((enable ? '▶ ' : '■ ') + name, enable ? 'ok' : 'inf');
  } catch(e) {
    cb.checked = !enable;
    addLog('Ошибка toggle: ' + e.message, 'err');
    toast('Ошибка: ' + e.message, 'err');
  } finally {
    wrap.classList.remove('busy');
    card.style.opacity = '';
  }
}

// ── RENDER RULES ──
function getFiltered() {
  const q = (document.getElementById('searchQ').value || '').toLowerCase();
  return rules.filter(r => {
    if (!isVis(r.comment)) return false;
    const disabled = r.disabled === 'true' || r.disabled === true;
    if (activeF === 'on'  && disabled)  return false;
    if (activeF === 'off' && !disabled) return false;
    if (q && !r.comment.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const list = document.getElementById('rulesList');
  const rows = getFiltered();

  if (rows.length === 0) {
    list.innerHTML = '<div class="empty">' +
      '<div class="empty-ico">⇌</div>' +
      '<h3>' + (rules.length === 0 ? 'Нет данных' : 'Нет совпадений') + '</h3>' +
      '<p>' + (rules.length === 0 ? 'Подключитесь к роутеру' : 'Измените фильтр или настройки видимости') + '</p>' +
      '</div>';
    return;
  }

  list.innerHTML = rows.map((r, i) => {
    const id  = r['.id'] || r.id || String(i);
    const on  = !(r.disabled === 'true' || r.disabled === true);
    const src = r['src-address'] || '';
    const dst = r['dst-address'] || '';
    const tbl = r['table']       || '';

    return '<div class="rule-card ' + (on ? 'on' : 'off') + '" style="animation-delay:' + (i*0.03) + 's">' +
      '<span class="rule-idx">' + (i+1) + '</span>' +
      '<div class="rule-body">' +
        '<div class="rule-comment">' + esc(r.comment) + '</div>' +
        '<div class="rule-tags">' +
          (src ? '<span class="tag src">src: ' + esc(src) + '</span>' : '') +
          (dst ? '<span class="tag dst">dst: ' + esc(dst) + '</span>' : '') +
          (tbl ? '<span class="tag tbl">table: ' + esc(tbl) + '</span>' : '') +
          '<span class="tag id">#' + esc(id) + '</span>' +
        '</div>' +
      '</div>' +
      '<label class="toggle">' +
        '<input type="checkbox" ' + (on ? 'checked' : '') +
          ' onchange="toggleRule(\'' + esc(id) + '\', this.checked, this)">' +
        '<span class="toggle-track"></span>' +
        '<span class="toggle-thumb"></span>' +
      '</label>' +
    '</div>';
  }).join('');
}

function renderVisList() {
  const list = document.getElementById('visList');
  const commented = rules.filter(r => r.comment);
  if (!commented.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.75rem;padding:.8rem">Нет правил с комментариями</div>';
    return;
  }
  list.innerHTML = commented.map(r => {
    const v   = isVis(r.comment);
    const src = r['src-address'] || '';
    const dst = r['dst-address'] || '';
    return '<div class="vis-item">' +
      '<label>' +
        '<input type="checkbox" ' + (v ? 'checked' : '') +
          ' onchange="setVis(\'' + esc(r.comment) + '\', this.checked)">' +
        esc(r.comment) +
      '</label>' +
      '<span class="vis-meta">' +
        (src ? 'src: ' + esc(src) : '') +
        (src && dst ? ' · ' : '') +
        (dst ? 'dst: ' + esc(dst) : '') +
      '</span>' +
    '</div>';
  }).join('');
}

function updateStats() {
  const vis = rules.filter(r => r.comment && isVis(r.comment));
  const on  = vis.filter(r => !(r.disabled === 'true' || r.disabled === true));
  const hid = rules.filter(r => r.comment && !isVis(r.comment));
  document.getElementById('sTotal').textContent = vis.length;
  document.getElementById('sOn').textContent    = on.length;
  document.getElementById('sOff').textContent   = vis.length - on.length;
  document.getElementById('sHid').textContent   = hid.length;
}

function setFilter(f, el) {
  activeF = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── STATUS ──
function setOnline(v) {
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusTxt');
  pill.className = 'pill' + (v ? ' online' : '');
  txt.textContent = v ? 'online' : 'offline';
}

// ── SKELETONS / ERR ──
function showSkels() {
  document.getElementById('rulesList').innerHTML =
    '<div class="skel"></div>' +
    '<div class="skel" style="opacity:.7"></div>' +
    '<div class="skel" style="opacity:.4"></div>';
}
function showErr(msg) {
  document.getElementById('rulesList').innerHTML =
    '<div class="empty"><div class="empty-ico">✕</div>' +
    '<h3>Нет подключения</h3><p>' + esc(msg) + '</p></div>';
  ['sTotal','sOn','sOff','sHid'].forEach(id => document.getElementById(id).textContent = '–');
}

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── TIMER ──
function startTimer() {
  if (timer) clearInterval(timer);
  if (cfg.refresh > 0) timer = setInterval(loadRules, cfg.refresh * 1000);
}

// ── LOG ──
function addLog(msg, type) {
  type = type || 'info';
  const t = new Date().toLocaleTimeString('ru', { hour12:false });
  logs.unshift({ t, msg, type });
  if (logs.length > 300) logs.pop();
  const box = document.getElementById('logBox');
  if (box) box.innerHTML = logs.map(l =>
    '<div class="log-row">' +
    '<span class="log-t">' + l.t + '</span>' +
    '<span class="log-m ' + l.type + '">' + esc(l.msg) + '</span>' +
    '</div>'
  ).join('');
}
function clearLog() { logs = []; document.getElementById('logBox').innerHTML = ''; }

// ── TOAST ──
function toast(msg, type) {
  type = type || 'inf';
  const icons = { ok:'✓', err:'✕', inf:'·' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span>' + (icons[type]||'·') + '</span>' +
    '<span style="flex:1">' + esc(msg) + '</span>' +
    '<button class="toast-x" onclick="this.parentElement.remove()">×</button>';
  document.getElementById('toasts').prepend(el);
  setTimeout(() => { if(el.parentNode) el.remove(); }, 3500);
}

// ── UTILS ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function gv(id) { const el=document.getElementById(id); return el?el.value:''; }
function sv(id,v) { const el=document.getElementById(id); if(el) el.value=v??''; }
</script>
</body>
</html>
